<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up — WhatsApp Sender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-body">
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="auth-shell">
      <a class="home-link auth-back" href="/">← Back to home</a>
      <div class="panel auth-card">
        <h1>Create account</h1>
        <p class="hint">Sign up to start sending WhatsApp messages from Excel.</p>
        <div id="clerk-sign-up"></div>
      </div>
    </main>
    <script src="/auth.js"></script>
    <script>
      (async () => {
        const clerk = await initClerk();
        if (clerk.user) {
          window.location.href = clerkRedirectParam();
          return;
        }
        clerk.mountSignUp(document.getElementById("clerk-sign-up"), {
          routing: "hash",
          signInUrl: `/sign-in.html?redirect_url=${encodeURIComponent(clerkRedirectParam())}`,
          afterSignUpUrl: clerkRedirectParam(),
        });
      })();
    </script>
  </body>
</html>
