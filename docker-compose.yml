services:
  whatsapp-sender:
    build: .
    # Behind Coolify/Traefik the proxy terminates HTTPS and forwards to this
    # container port; nothing else is needed for https:// to work.
    expose:
      - "3000"
    # Host port mapping is only for running locally without a reverse proxy.
    ports:
      - "3000:3000"
    volumes:
      - wwebjs_auth:/data/.wwebjs_auth
      - uploads:/app/uploads
    restart: unless-stopped
    shm_size: "256mb"
    environment:
      - PORT=3000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - WWEBJS_AUTH_PATH=/data/.wwebjs_auth
      # To serve HTTPS directly from the app (no reverse proxy), mount your
      # certificate into the container and uncomment:
      # - SSL_CERT_PATH=/certs/fullchain.pem
      # - SSL_KEY_PATH=/certs/privkey.pem
    # ...and mount the certs, e.g.:
    # volumes:
    #   - /etc/letsencrypt/live/example.com:/certs:ro

volumes:
  wwebjs_auth:
  uploads:
