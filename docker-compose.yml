services:
  whatsapp-sender:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - wwebjs_auth:/data/.wwebjs_auth
      - uploads:/app/uploads
    restart: unless-stopped
    shm_size: "256mb"
    environment:
      - PORT=3000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - WWEBJS_AUTH_PATH=/data/.wwebjs_auth

volumes:
  wwebjs_auth:
  uploads:
