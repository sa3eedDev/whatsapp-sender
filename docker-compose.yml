services:
  whatsapp-sender:
    build: .
    expose:
      - "80"
    ports:
      - "8080:80"
    volumes:
      - app_data:/data
    restart: unless-stopped
    shm_size: "256mb"
    environment:
      - PORT=80
      - DATA_ROOT=/data
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - WWEBJS_AUTH_PATH=/data/.wwebjs_auth
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}

volumes:
  app_data:
